apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil-playground
  template:
    metadata:
      labels:
        app: wil-playground
    spec:
      containers:
      - name: wil-playground
        # Start with version v1
        image: wil42/playground:v3
        ports:
        - containerPort: 8888

---
apiVersion: v1
kind: Service
metadata:
  name: wilson-service
  namespace: dev
spec:
  selector:
    app: wil-playground
  ports:
    - protocol: TCP
      port: 8888 # The port requested by the PDF
      targetPort: 8888 # The port the container is listening on
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wilson-ingress
  namespace: dev
  annotations:
    # Tells K3d's built-in Traefik loadbalancer to serve this rule on standard HTTP
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wilson-service
            port:
              number: 8888